<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.lock-card{background:#fff;border-radius:16px;padding:48px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:400px;width:90%}

.lock-card input:focus{border-color:#2563eb}
.lock-card button{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;transition:background 0.2s}
.lock-card button:hover{background:#1d4ed8}
.error{color:#dc2626;font-size:13px;margin-top:8px;display:none}
</style>

async function decrypt(){
  try{
    document.getElementById('err').style.display='none';
    const pwd=document.getElementById('pwd').value;
    const enc=new TextEncoder();
    const saltBuf=Uint8Array.from(atob(SALT),c=>c.charCodeAt(0));
    const ivBuf=Uint8Array.from(atob(IV),c=>c.charCodeAt(0));
    const ctBuf=Uint8Array.from(atob(CT),c=>c.charCodeAt(0));
    const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(pwd),'PBKDF2',false,['deriveBits','deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:saltBuf,iterations:100000,hash:'SHA-256'},keyMaterial,{name:'AES-GCM',length:256},false,['decrypt']);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:ivBuf},key,ctBuf);
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').style.display='block';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}
</script>
